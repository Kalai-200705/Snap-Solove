name: snap_solve
description: A civic issue reporting app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  geolocator: ^10.1.0
  speech_to_text: ^7.0.0
  record: ^5.0.4
  url_launcher: ^6.2.5
  fl_chart: ^0.68.0
  google_maps_flutter: ^2.6.0
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  geocoding: ^2.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  record_linux: ^1.0.0
  record_platform_interface: ^1.0.0

flutter:
  uses-material-design: true
